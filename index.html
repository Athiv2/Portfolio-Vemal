<style>
  :root {
    --primary: #00f0ff;
    --secondary: #ff00d4;
    --accent: #ffdd00;
    --bg: #030712;
    --bg2: #0a0f1e;
    --text: #e8eaf6;
    --muted: #6b7280;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --space-section: clamp(70px, 12vw, 120px);
    --pad-x: clamp(20px, 7vw, 120px);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
  body { 
    background: var(--bg); 
    color: var(--text); 
    font-family: 'Outfit', sans-serif; 
    overflow-x: hidden; 
    cursor: none;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* Custom cursor — hidden on touch devices */
  #cursor, #cursor-ring { display: none; }
  @media (hover: hover) and (pointer: fine) {
    #cursor { display:block; width:12px;height:12px;background:var(--primary);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);transition:transform .15s ease,background .3s,width .25s,height .25s;mix-blend-mode:screen; }
    #cursor-ring { display:block; width:38px;height:38px;border:1.5px solid rgba(0,240,255,.45);border-radius:50%;position:fixed;top:0;left:0;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);transition:width .2s ease,height .2s ease,border-color .3s ease; }
  }

  #loader { position:fixed;inset:0;background:var(--bg);z-index:10000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;transition:opacity .8s ease,visibility .8s ease;padding:20px; }
  #loader.hidden { opacity:0;visibility:hidden; }
  .loader-name { font-family:'Syne',sans-serif;font-size:clamp(24px,5vw,52px);font-weight:800;letter-spacing:.06em;background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 2.5s linear infinite;background-size:200%;text-align:center; }
  @keyframes shimmer { 0%{background-position:0% 50%}100%{background-position:200% 50%} }
  .loader-bar-wrap { width:min(250px,70vw);height:4px;background:rgba(255,255,255,.08);border-radius:99px;overflow:hidden; }
  .loader-bar { height:100%;background:linear-gradient(90deg,var(--primary),var(--secondary));border-radius:99px;width:0%;transition:width .05s linear; }
  .loader-pct { font-family:'Space Mono',monospace;font-size:13px;color:var(--muted);letter-spacing:2px; }

  #bg-canvas { position:fixed;inset:0;z-index:0;pointer-events:none;opacity:.55; }

  /* NAV */
  nav { position:fixed;top:0;left:0;right:0;z-index:100;padding:16px var(--pad-x);display:flex;align-items:center;justify-content:space-between;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);background:rgba(3,7,18,.65);border-bottom:1px solid var(--glass-border);transition:padding .3s,background .3s; }
  nav.scrolled { padding-top:10px;padding-bottom:10px;background:rgba(3,7,18,.85); }
  .nav-logo { font-family:'Syne',sans-serif;font-size:15px;font-weight:800;letter-spacing:.12em;color:var(--primary);text-decoration:none;z-index:101; }
  .nav-links { display:flex;gap:clamp(18px,2.5vw,32px);list-style:none; }
  .nav-links a { font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);text-decoration:none;transition:color .3s;font-family:'Space Mono',monospace;position:relative; }
  .nav-links a::after { content:'';position:absolute;left:0;bottom:-4px;width:0;height:1px;background:var(--primary);transition:width .3s ease; }
  .nav-links a:hover { color:var(--primary); }
  .nav-links a:hover::after { width:100%; }

  /* Mobile menu */
  .nav-toggle { display:none;background:none;border:none;color:var(--text);font-size:22px;cursor:pointer;z-index:101; }
  #mobile-menu { position:fixed;inset:0;background:rgba(3,7,18,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);z-index:99;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:32px;opacity:0;visibility:hidden;transition:opacity .4s ease,visibility .4s ease; }
  #mobile-menu.open { opacity:1;visibility:visible; }
  #mobile-menu a { font-family:'Syne',sans-serif;font-size:28px;font-weight:700;color:var(--text);text-decoration:none;letter-spacing:1px;transition:color .3s,transform .3s;transform:translateY(20px);opacity:0; }
  #mobile-menu.open a { transform:translateY(0);opacity:1; }
  #mobile-menu.open a:nth-child(1){transition-delay:.1s}
  #mobile-menu.open a:nth-child(2){transition-delay:.15s}
  #mobile-menu.open a:nth-child(3){transition-delay:.2s}
  #mobile-menu.open a:nth-child(4){transition-delay:.25s}
  #mobile-menu a:hover { color:var(--primary); }

  main { position:relative;z-index:1; }
  section { padding:var(--space-section) var(--pad-x); }
  .divider { height:1px;background:var(--glass-border);margin:0 var(--pad-x); }

  /* HERO */
  #hero { min-height:100vh;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;position:relative;overflow:hidden;padding:90px var(--pad-x) 70px; }
  .hero-badge { font-family:'Space Mono',monospace;font-size:clamp(10px,1.5vw,12px);letter-spacing:3px;color:var(--primary);border:1px solid rgba(0,240,255,.3);padding:6px 18px;border-radius:99px;margin-bottom:clamp(24px,4vw,40px);background:rgba(0,240,255,.06);animation:fadeUp .8s ease both .2s;display:inline-flex;align-items:center;gap:8px; }
  .hero-badge .pulse-dot { width:8px;height:8px;border-radius:50%;background:var(--accent);animation:pulse 1.5s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.3)} }
  .hero-name { font-family:'Syne',sans-serif;font-size:clamp(40px,11vw,130px);font-weight:800;line-height:.95;letter-spacing:-.02em;display:block;margin-bottom:clamp(16px,3vw,24px); }
  .line1 { display:block;background:linear-gradient(135deg,var(--text) 30%,var(--primary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:slideInLeft 1s cubic-bezier(.16,1,.3,1) both .4s; }
  .line2 { display:block;background:linear-gradient(135deg,var(--secondary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:slideInRight 1s cubic-bezier(.16,1,.3,1) both .6s; }
  @keyframes slideInLeft { from{opacity:0;transform:translateX(-60px)}to{opacity:1;transform:translateX(0)} }
  @keyframes slideInRight { from{opacity:0;transform:translateX(60px)}to{opacity:1;transform:translateX(0)} }
  .hero-subtitle { font-size:clamp(13px,2vw,18px);color:var(--muted);max-width:680px;line-height:1.7;margin-bottom:clamp(32px,5vw,48px);animation:fadeUp .8s ease both .8s;padding:0 10px; }
  .hero-btns { display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:fadeUp .8s ease both 1s; }
  .btn-primary { display:inline-flex;align-items:center;gap:10px;padding:14px 30px;background:linear-gradient(135deg,var(--primary),var(--secondary));border:none;border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;color:#000;cursor:pointer;text-decoration:none;transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden; }
  .btn-primary::before { content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transition:left .5s; }
  .btn-primary:hover::before { left:100%; }
  .btn-primary:hover { transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,240,255,.3); }
  .btn-secondary { display:inline-flex;align-items:center;gap:10px;padding:14px 30px;background:transparent;border:1.5px solid rgba(0,240,255,.4);border-radius:12px;font-family:'Outfit',sans-serif;font-size:15px;font-weight:500;color:var(--primary);cursor:pointer;text-decoration:none;transition:all .2s; }
  .btn-secondary:hover { background:rgba(0,240,255,.08);transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,240,255,.15); }

  .scroll-hint { position:absolute;bottom:30px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;animation:fadeUp 1s ease both 1.4s; }
  .scroll-hint span { font-family:'Space Mono',monospace;font-size:10px;letter-spacing:3px;color:var(--muted); }
  .scroll-arrow { width:1px;height:40px;background:linear-gradient(to bottom,var(--muted),transparent);animation:scrollArrow 2s ease infinite; }
  @keyframes scrollArrow { 0%,100%{transform:scaleY(1);opacity:.8}50%{transform:scaleY(1.4);opacity:.3} }

  .section-label { font-family:'Space Mono',monospace;font-size:clamp(10px,1.5vw,11px);letter-spacing:3px;color:var(--primary);display:block;margin-bottom:16px;text-transform:uppercase; }
  .section-title { font-family:'Syne',sans-serif;font-size:clamp(30px,6vw,64px);font-weight:800;line-height:1.1;margin-bottom:clamp(40px,7vw,60px); }
  .glow { background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text; }

  /* Unique reveal animations */
  .reveal { opacity:0;transform:translateY(50px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1); }
  .reveal.visible { opacity:1;transform:none; }
  .reveal-left { opacity:0;transform:translateX(-60px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1); }
  .reveal-left.visible { opacity:1;transform:none; }
  .reveal-right { opacity:0;transform:translateX(60px);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1); }
  .reveal-right.visible { opacity:1;transform:none; }
  .reveal-scale { opacity:0;transform:scale(.85);transition:opacity .9s cubic-bezier(.16,1,.3,1),transform .9s cubic-bezier(.16,1,.3,1); }
  .reveal-scale.visible { opacity:1;transform:none; }
  .stagger > * { opacity:0;transform:translateY(30px);transition:opacity .7s ease,transform .7s ease; }
  .stagger.visible > * { opacity:1;transform:none; }
  .stagger.visible > *:nth-child(1){transition-delay:.05s}
  .stagger.visible > *:nth-child(2){transition-delay:.12s}
  .stagger.visible > *:nth-child(3){transition-delay:.19s}
  .stagger.visible > *:nth-child(4){transition-delay:.26s}
  .stagger.visible > *:nth-child(5){transition-delay:.33s}
  .stagger.visible > *:nth-child(6){transition-delay:.40s}
  .stagger.visible > *:nth-child(7){transition-delay:.47s}

let currentQuote = 0;
let quoteTimer = null;

function buildDots() {
  const dots = document.getElementById('quoteDots');
  dots.innerHTML = '';
  QUOTES.forEach((_, i) => {
    const d = document.createElement('span');
    d.className = 'quote-dot' + (i === currentQuote ? ' active' : '');
    d.onclick = () => showQuote(i);
    dots.appendChild(d);
  });
}

function showQuote(idx) {
  const inner = document.getElementById('quoteInner');
  inner.classList.add('fade-out');
  setTimeout(() => {
    currentQuote = idx;
    document.getElementById('quoteText').textContent = QUOTES[idx].q;
    document.getElementById('quoteAuthor').textContent = '— ' + QUOTES[idx].a;
    buildDots();
    inner.classList.remove('fade-out');
    inner.classList.add('fade-in');
  }, 500);
}

function nextQuote() { showQuote((currentQuote + 1) % QUOTES.length); }

function startQuoteTimer() {
  clearInterval(quoteTimer);
  quoteTimer = setInterval(nextQuote, 1000);
}

// Change quote on scroll
let lastScrollY = window.scrollY;
let scrollQuoteThrottle = false;
window.addEventListener('scroll', () => {
  if (scrollQuoteThrottle) return;
  scrollQuoteThrottle = true;
  setTimeout(() => {
    const delta = Math.abs(window.scrollY - lastScrollY);
    if (delta > 200) {
      nextQuote();
      startQuoteTimer();
      lastScrollY = window.scrollY;
    }
    scrollQuoteThrottle = false;
  }, 100);
});

// ── LOADER ───────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('footerYear').textContent = new Date().getFullYear();

  // Init first quote
  document.getElementById('quoteText').textContent = QUOTES[0].q;
  document.getElementById('quoteAuthor').textContent = '— ' + QUOTES[0].a;
  buildDots();

  let pct = 0;
  const bar = document.getElementById('loaderBar');
  const pctEl = document.getElementById('loaderPct');
  const loader = document.getElementById('loader');

  const interval = setInterval(() => {
    pct += Math.random() * 8 + 2;
    if (pct >= 100) {
      pct = 100;
      clearInterval(interval);
      bar.style.width = '100%';
      pctEl.textContent = '100%';
      setTimeout(() => {
        loader.classList.add('hidden');
        playIntroAudio();
        initReveal();
        startQuoteTimer();
      }, 500);
    }
    bar.style.width = pct + '%';
    pctEl.textContent = Math.floor(pct) + '%';
  }, 60);
});

// ── CURSOR ───────────────────────────────
const cursor = document.getElementById('cursor');
const ring   = document.getElementById('cursor-ring');
let mx = 0, my = 0, rx = 0, ry = 0;
document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
function animCursor() {
  cursor.style.left = mx + 'px';
  cursor.style.top  = my + 'px';
  rx += (mx - rx) * .12;
  ry += (my - ry) * .12;
  ring.style.left = rx + 'px';
  ring.style.top  = ry + 'px';
  requestAnimationFrame(animCursor);
}
animCursor();
document.querySelectorAll('a,button,.skill-item,.social-item').forEach(el => {
  el.addEventListener('mouseenter', () => { cursor.style.width='22px';cursor.style.height='22px';cursor.style.background='var(--secondary)';ring.style.width='56px';ring.style.height='56px';ring.style.borderColor='rgba(255,0,212,.5)'; });
  el.addEventListener('mouseleave', () => { cursor.style.width='14px';cursor.style.height='14px';cursor.style.background='var(--primary)';ring.style.width='40px';ring.style.height='40px';ring.style.borderColor='rgba(0,240,255,.5)'; });
});

// ── BACKGROUND CANVAS ────────────────────
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resizeCanvas() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
function initParticles() {
  particles = [];
  for (let i = 0; i < 90; i++) {
    particles.push({ x:Math.random()*W, y:Math.random()*H, r:Math.random()*1.8+.3, dx:(Math.random()-.5)*.4, dy:(Math.random()-.5)*.4, alpha:Math.random()*.6+.2, color:Math.random()>.5?'#00f0ff':'#ff00d4' });
  }
}
function drawGrid() {
  ctx.strokeStyle='rgba(0,240,255,0.03)';ctx.lineWidth=1;
  const s=80;
  for(let x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}
function drawParticles() {
  particles.forEach(p => {
    ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=p.color;ctx.globalAlpha=p.alpha;ctx.fill();ctx.globalAlpha=1;
    p.x+=p.dx;p.y+=p.dy;
    if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;
  });
  particles.forEach((a,i)=>{
    particles.slice(i+1).forEach(b=>{
      const d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<130){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.strokeStyle=`rgba(0,240,255,${(.12*(1-d/130)).toFixed(3)})`;ctx.lineWidth=.5;ctx.stroke();}
    });
  });
}
function animCanvas() { ctx.clearRect(0,0,W,H);drawGrid();drawParticles();requestAnimationFrame(animCanvas); }
resizeCanvas();initParticles();animCanvas();
window.addEventListener('resize',()=>{resizeCanvas();initParticles();});

// ── REVEAL ───────────────────────────────
function initReveal() {
  const els = document.querySelectorAll('.reveal');
  const obs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('visible');obs.unobserve(e.target);}});
  },{threshold:.15});
  els.forEach(el=>obs.observe(el));
}

// ── EDU TOGGLE ───────────────────────────
function toggleEdu(i) {
  const cards = document.querySelectorAll('.edu-card');
  const card  = cards[i];
  const isActive = card.classList.contains('active');
  cards.forEach(c=>c.classList.remove('active'));
  if(!isActive) card.classList.add('active');
}

// ── SKILL POP ────────────────────────────
const colors = ['#00f0ff','#ff00d4','#ffdd00','#39ff14','#ff6b6b'];
function popSkill(el, event) {
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
  const rect=el.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  for(let s=0;s<14;s++){
    const spark=document.createElement('div');
    spark.classList.add('spark');
    const size=Math.random()*8+4, angle=Math.random()*Math.PI*2, dist=Math.random()*80+40, color=colors[Math.floor(Math.random()*colors.length)];
    spark.style.cssText=`width:${size}px;height:${size}px;background:${color};left:${cx}px;top:${cy}px;--dx:${Math.cos(angle)*dist}px;--dy:${Math.sin(angle)*dist}px;box-shadow:0 0 8px ${color};`;
    document.body.appendChild(spark);
    spark.addEventListener('animationend',()=>spark.remove());
  }
}
</script>
